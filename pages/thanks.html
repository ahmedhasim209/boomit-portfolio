<!-- @format -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- favicon -->
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
    <!-- CSS files -->
    <link rel="stylesheet" href="../css/shared.css" />
    <!-- <link rel="stylesheet" href="../css/service.css" /> -->
    <!-- all main file -->
    <link rel="stylesheet" href="../css/all.min.css" defer />
    <!-- normliaz cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
      defer />
    <!-- fontawesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <title>BOOMIT!</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --red: #d0021b;
        --cream: #faf8f3;
        --dark: #1a1a1a;
        --mid: #555;
        --green: #3dbe6a;
        --green2: #2ea055;
        --nav-h: 64px;
      }

      html,
      body {
        height: 100%;
        background: var(--cream);
        font-family: "DM Sans", sans-serif;
        color: var(--dark);
      }
      main {
        height: 100vh;
        width: 100vw;
      }
      main .container {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .cta-btn {
        background: var(--red);
        color: #fff;
        border: none;
        padding: 10px 24px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 16px;
        letter-spacing: 2px;
        border-radius: 50px;
        cursor: pointer;
        text-decoration: none;
        transition:
          background 0.2s,
          transform 0.15s;
      }
      .cta-btn:hover {
        background: #a8000f;
        transform: scale(1.04);
      }
      .card {
        text-align: center;
        padding: 72px 56px 64px;
        max-width: 520px;
        width: 92%;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 8px 48px rgba(0, 0, 0, 0.08);
        animation: rise 0.65s cubic-bezier(0.22, 0.9, 0.38, 1) both;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(28px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      /* ── CHECK ICON ── */
      .check-wrap {
        margin: 0 auto 32px;
        width: 96px;
        height: 96px;
        background: var(--green);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pop 0.55s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        box-shadow: 0 6px 28px rgba(61, 190, 106, 0.35);
      }
      @keyframes pop {
        from {
          opacity: 0;
          transform: scale(0.4);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .check-wrap svg {
        width: 48px;
        height: 48px;
        stroke: #fff;
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        /* draw-on animation */
        stroke-dasharray: 80;
        stroke-dashoffset: 80;
        animation: draw 0.45s 0.75s ease forwards;
      }

      @keyframes draw {
        to {
          stroke-dashoffset: 0;
        }
      }

      /* ── CONTENT ── */
      h1 {
        font-family: "DM Sans", sans-serif;
        font-size: 26px;
        font-weight: 700;
        line-height: 1.3;
        margin-bottom: 14px;
        animation: fade 0.5s 0.5s both;
      }

      p {
        font-size: 14.5px;
        color: var(--mid);
        line-height: 1.7;
        margin-bottom: 36px;
        animation: fade 0.5s 0.6s both;
      }

      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .home-btn {
        display: inline-block;
        text-decoration: none;
        color: var(--red);
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.5px;
        border: 1.8px solid var(--red);
        border-radius: 8px;
        padding: 12px 48px;
        transition:
          background 0.2s,
          color 0.2s,
          transform 0.15s;
        animation: fade 0.5s 0.7s both;
      }
      .home-btn:hover {
        background: var(--red);
        color: #fff;
        transform: scale(1.03);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="card">
          <!-- Animated check circle -->
          <div class="check-wrap">
            <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
              <polyline points="14 27 22 35 38 18" />
            </svg>
          </div>

          <h1>Boom!, We've Successfully Received<br />Your Details.</h1>
          <p>
            Thanks For Connecting With Boom It. Our Team Is On It And Will<br />Get
            Back To You Shortly!
          </p>
          <a href="../../index.html" class="home-btn">Home</a>
        </div>
      </div>
    </main>
  </body>
</html>
